---

  - name: Configure juniper Devices
    junos_system:
      hostname: "{{ inventory_hostname }}"
      name_servers: "{{ global.dns }}"
      state: present
  - name: "Configure Users"
    junos_user:
      name: "{{ item.username }}"
      role: "{{ item.role }}"
      SSHkey: "{{ lookup ('file', item.SSH_key) }}"
    with_items: "{{ global.users | selectattr('SSH_key','defined') | list }}"