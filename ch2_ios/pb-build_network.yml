---

- name: "Play 1 Configure all Lan Switches"
  hosts: access01, core01
  tags: lan
  gather_facts: true
  tasks:
# THIS PLAY CONFIGURES THE HOST NAME AND DOMAIN NAME
    - name: "Configure Hostname and Domain Name"
      ios_system:
        hostname: "{{inventory_hostname}}"
        domain_name: "{{domain_name}}"
        lookup_enabled: false
        name_servers: "{{dns_servers}}"
# THIS PLAY IS CONFIGURING THE NTP SERVERS 
    - name: "Configure NTP"
      ios_ntp:
        server: "{{ntp_server}}"
        logging: true
        state: present
# THIS PLAY IS CONFIGURING THE INTERFACES
    - name: "Configure Interfaces"
      ios_interfaces:
        config:
          - name: "{{item.name}}"
            description: "{{item.description}}"
            enabled: true
            duplex: "{{ Int_duplex }}"
            mtu: "{{Int_mtu}}"
        state: merged
      with_items: "{{ Interfaces[inventory_hostname] }}"
# THIS PLAY IS CONFIGURING THE L2 VLANS
    - name: "Create L2 VLANS"
      ios_vlan:
        vlan_id: "{{item.vlan_id}}"
        name: "{{item.name}}"
      with_items: "{{vlans}}"
      tags: vlan
# THIS PLAY IS CONFIGURING THE TRUNKS ON THE CORE SWITCHES 
    - name: "Configure L2 Trunks" # MAKE A CORRECTION ON THIS PLAY IT WILL FAIL
      ios_l2_interfaces:
        config:
          - name: "{{ item.name }}"
            trunk: "{{item.mode}}"
            allowed_vlans: "{{ vlans | map(attribute='vlan_id') | join(' , ') }}"
        state: merged
      with_items: "{{ Interfaces[inventory_hostname] | selectattr('mode' , 'equalto' , 'trunk') | list }}"
 
    - name: "Enable dot1q Trunks"
      ios_config: 
        lines:
          - switchport trunk encapsulation dot1q
        parents: Interfaces {{item.name}}
      with_items: "{{Interfaces[inventory_hostname] | selecttr('mode' , 'equalto' , 'trunk' ) | list }}"
      tags: dot1q

    - name: "Configure Access Prots"
      ios_l2_interfaces:
        config:
          name: "{{ item.name }}"
          mode: "{{item.mode}}"
          access_vlan: "{{item.vlan}}"
          state: present
    - name: "P1T3: Configure Interfaces"
      ios_interfaces:
        name: "{{ item.name }}"

    
      